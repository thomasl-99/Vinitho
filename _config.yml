# Jekyll-config voor Vinitho — landingspagina Italiaanse wijnimport
#
# Dit bestand is bewust minimaal: alleen wat we zeker weten.
# Specifieke wijnen, prijzen en leveranciers worden pas later toegevoegd
# als Thomas ze bevestigt. Verzonnen data = niet in deze repo.

title: "Vinitho"
tagline: "Italiaanse wijnimport"
description: "Vinitho — Italiaanse wijnimport uit Amstelveen. Eenmanszaak van Thomas Langeberg (KvK 97388505, btw NL005266959B81)."
author: "Thomas Langeberg"

# Domein
url: "https://vinitho.nl"
baseurl: ""

# Markdown rendering
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
# /:title/ veroorzaakt dat site.posts leeg is — Jekyll verwacht datum in pad

# Front-matter defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: default
      lang: nl

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed

# Exclusies
exclude:
  - README.md
  - LICENSE
  - scripts/
  - examples/
  - "*.sh"
